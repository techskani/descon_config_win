# ------------------------------------------------------------------------
# descon.yaml (DRAFT version: 0.10)
#
# 説明：
# 対象拠点にDESCON中央装置と複数のリモート装置（令和デバイス）が存在する。
# リモート装置は下記の事象を検知し、危険度に応じて注意アラートまたは警報アラートを
# 発生する。警報レベルのときは設定により自動遮断も行う。
#     1.トラッキング(arc tracking)
#     2.ジュール熱(joule heat)
#     3.過電流(over current)
#     4.漏洩電流(leakage current)
# DESCON中央装置はリモート装置を監視し、メールと電話で遠隔にアラート送信する。
#
# 設定：
# site: この設定が適用される対象の拠点名
# polling-interval: 中央装置が各リモート装置を並行ポーリングする時間間隔（秒）
# mqtt-ipaddr: MQTTブローカーのIPアドレス
# mqtt-port: MQTTブローカーのポート
#
# mails:
#   - smtp-server: アラートをメールで通知する際のSMTPサーバーのIPアドレス
#     smtp-port: 上記SMTPサーバーのTCPポート
#     smtp-user: 上記SMTPサーバーのユーザー
#     smtp-password: 上記SMTPサーバーのパスワード
#     smtp-to: アラートをメールで通知する際の相手先のメールアドレスのリスト
#     starttls: 送信時にSTARTTLSを使うか
#
# phones:
#   - phone-api: アラートを音声電話で通知する際に利用するクラウド電話APIの種類
#     phone-from: 上記電話APIの発信元の電話番号
#     phone-to: 上記電話APIの相手先の電話番号のリスト
#     phone-timeout: アラートを音声電話で通知する際の1回の呼び出しタイムアウト（秒）
#     phone-retries: 上記タイムアウト時に電話をかけ直す回数
#
# circuit-names:
#   - 電気回路名（表示名およびアンカー）
#
# devices:
#   - name: 盤名称
#     model: この盤を監視するリモート装置の型番
#     ipaddr: 上記リモート装置のIPアドレス
#     port: 上記リモート装置のTCPポート
#     circuits: 
#      - name: 電気回路名（表示名およびアンカー）
#        power: 電源種別（表示用）
#        breaker: ブレーカー（表示用）
#        wire: 電線種別（表示用）
#
#     temp-names: 各温度センサーNoに対応する電気回路表示名
#     track-names: 各トラッキング・センサーNoに対応する電気回路表示名
#     curr-names: 各電流センサーNoに対応する電気回路表示名
#     leak-names: 各漏洩電流センサーNoに対応する電気回路表示名
#     volt-names: 各電圧センサーNoに対応する電気回路表示名
#     brkr-names: 各ブレカーNoに対応する電気回路表示名
#
#     temp: 温度センサーの設定用コマンド列
#     track: トラッキングセンサーの設定用コマンド列
#     curr: 電流センサーの設定用コマンド列
#     leak: 漏洩電流センサーの設定用コマンド列
#     volt: 空にしておく（予備）
#     time: 空にしておく（予備）
#     ptc:  空にしておく（予備）
# ------------------------------------------------------------------------
